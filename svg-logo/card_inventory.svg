<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22">

  <!-- Car roof / windshield bump -->
  <rect x="4" y="3" width="14" height="8" rx="3" ry="3" fill="#01377d"/>

    <!-- Windshield outline (white cutout inside roof) -->
  <rect x="5" y="4" width="12" height="6" rx="3" ry="2" fill="white"/>


  <!-- Car body -->
  <rect x="2" y="8" width="18" height="8" rx="2" ry="2" fill="#01377d"/>
  
  <!-- Left bumper leg -->
  <rect x="3" y="15" width="3" height="4" rx="1" ry="1" fill="#01377d"/>

  <!-- Right bumper leg -->
  <rect x="16" y="15" width="3" height="4" rx="1" ry="1" fill="#01377d"/>

  <!-- Left headlight (white circle) -->
  <circle cx="5" cy="13" r="2" fill="white"/>

  <!-- Right headlight (white circle) -->
  <circle cx="17" cy="13" r="2" fill="white"/>

  <!-- Center grille bar -->
  <rect x="8" y="12" width="6" height="2" rx="1" ry="1" fill="white"/>


</svg>